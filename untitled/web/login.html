<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 大数据平台</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/request-capsule.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="var(--accent-primary)"/>
            <path d="M24 14L32 20V34H28V24H20V34H16V20L24 14Z" fill="white"/>
          </svg>
        </div>
        <h1>大数据平台</h1>
        <p class="subtitle">欢迎回来，请登录您的账户</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">用户名</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="请输入用户名"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="请输入密码"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <span>记住我</span>
          </label>
          <a href="#" class="forgot-password">忘记密码？</a>
        </div>

        <button type="submit" class="login-button">
          <span id="loginButtonText">登录</span>
          <span id="loginButtonLoader" class="button-loader" style="display: none;">
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
              <circle class="spinner-circle" cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none"/>
            </svg>
          </span>
        </button>

        <div id="loginMessage" class="login-message" style="display: none;"></div>
      </form>

      <div class="login-footer">
        <p>还没有账户？ <a href="#">立即注册</a></p>
      </div>
    </div>

    <div class="login-info">
      <h2>功能特性</h2>
      <ul class="feature-list">
        <li>
          <span class="feature-icon">📊</span>
          <div>
            <strong>实时数据分析</strong>
            <p>强大的数据可视化与分析能力</p>
          </div>
        </li>
        <li>
          <span class="feature-icon">🔒</span>
          <div>
            <strong>安全可靠</strong>
            <p>企业级安全保障，数据加密传输</p>
          </div>
        </li>
        <li>
          <span class="feature-icon">⚡</span>
          <div>
            <strong>高性能</strong>
            <p>毫秒级响应，支持海量数据处理</p>
          </div>
        </li>
        <li>
          <span class="feature-icon">🌙</span>
          <div>
            <strong>主题切换</strong>
            <p>支持日间/夜间模式自动切换</p>
          </div>
        </li>
      </ul>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.9.0/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/request.js"></script>
  <script src="js/theme-manager.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const rememberMeCheckbox = document.getElementById('rememberMe');
      const loginButton = loginForm.querySelector('.login-button');
      const loginButtonText = document.getElementById('loginButtonText');
      const loginButtonLoader = document.getElementById('loginButtonLoader');
      const loginMessage = document.getElementById('loginMessage');

      // 自动填充上次保存的用户名
      const savedUsername = localStorage.getItem('saved-username');
      if (savedUsername) {
        usernameInput.value = savedUsername;
        rememberMeCheckbox.checked = true;
      }

      // 显示消息
      function showMessage(message, type = 'info') {
        loginMessage.textContent = message;
        loginMessage.className = 'login-message ' + type;
        loginMessage.style.display = 'block';

        if (type === 'success') {
          setTimeout(() => {
            loginMessage.style.display = 'none';
          }, 3000);
        }
      }

      // 设置加载状态
      function setLoading(isLoading) {
        loginButton.disabled = isLoading;
        loginButtonText.style.display = isLoading ? 'none' : 'inline';
        loginButtonLoader.style.display = isLoading ? 'inline-flex' : 'none';
      }

      // 表单提交
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
          showMessage('请输入用户名和密码', 'error');
          return;
        }

        // 保存用户名
        if (rememberMeCheckbox.checked) {
          localStorage.setItem('saved-username', username);
        } else {
          localStorage.removeItem('saved-username');
        }

        setLoading(true);
        loginMessage.style.display = 'none';

        try {
          // 创建登录请求
          const loginRequest = new Request('用户登录', 'auth/login');

          // 发送登录请求
          const response = await loginRequest.post({
            username: username,
            password: password,
            rememberMe: rememberMeCheckbox.checked
          });

          // 登录成功
          console.log('登录成功:', response.data);
          showMessage('登录成功！正在跳转...', 'success');

          // 保存 token（如果后端返回）
          if (response.data && response.data.token) {
            localStorage.setItem('auth-token', response.data.token);
          }

          // 延迟跳转到主页
          setTimeout(() => {
            window.location.href = 'simple.html';
          }, 1500);

        } catch (error) {
          console.error('登录失败:', error);
          setLoading(false);

          // 根据错误类型显示不同消息
          let errorMessage = '登录失败，请重试';

          if (error.response) {
            // 服务器返回错误
            if (error.response.status === 401) {
              errorMessage = '用户名或密码错误';
            } else if (error.response.status === 403) {
              errorMessage = '账户已被禁用';
            } else if (error.response.data && error.response.data.message) {
              errorMessage = error.response.data.message;
            }
          } else if (error.request) {
            // 网络错误
            errorMessage = '无法连接到服务器，请检查网络';
          }

          showMessage(errorMessage, 'error');
        }
      });

      // 回车快捷键
      usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          passwordInput.focus();
        }
      });

      // 焦点样式
      [usernameInput, passwordInput].forEach(input => {
        input.addEventListener('focus', () => {
          input.parentElement.classList.add('focused');
        });
        input.addEventListener('blur', () => {
          input.parentElement.classList.remove('focused');
        });
      });
    });
  </script>
</body>
</html>
