<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Impact Analysis - 图表展示</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-secondary);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      background: var(--bg-primary);
      padding: 2rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      margin: 0 0 0.5rem 0;
      color: var(--text-primary);
    }

    .header p {
      margin: 0;
      color: var(--text-secondary);
    }

    .controls {
      background: var(--bg-primary);
      padding: 1.5rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls label {
      font-weight: 500;
      color: var(--text-primary);
    }

    .controls select,
    .controls input {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 1rem;
    }

    .controls button {
      padding: 0.5rem 1.5rem;
      background: var(--accent-primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .controls button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .chart-container {
      background: var(--bg-primary);
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .chart-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    #chart {
      width: 100%;
      height: 500px;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }

    .data-info {
      background: var(--bg-secondary);
      padding: 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .data-info strong {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Family Impact Analysis Dashboard</h1>
      <p>实时数据库数据图表展示</p>
    </div>

    <div class="controls">
      <label for="tableName">数据表:</label>
      <select id="tableName">
        <option value="family_impact_analysis">family_impact_analysis</option>
        <option value="score_analysis" selected>score_analysis</option>
      </select>

      <label for="chartType">图表类型:</label>
      <select id="chartType">
        <option value="bar">柱状图</option>
        <option value="line">折线图</option>
        <option value="pie">饼图</option>
        <option value="scatter">散点图</option>
        <option value="mix">混合图</option>
      </select>

      <label for="limit">数据量:</label>
      <input type="number" id="limit" value="50" min="10" max="500" step="10">

      <button onclick="loadChart()">刷新图表</button>
      <button onclick="downloadData()">下载数据</button>
    </div>

    <div id="error-container"></div>

    <div class="chart-container">
      <div class="chart-title">数据可视化</div>
      <div id="chart">
        <div class="loading">加载中...</div>
      </div>
      <div class="data-info" id="data-info"></div>
    </div>

    <details style="background: var(--bg-primary); padding: 1rem; border-radius: 8px;">
      <summary style="cursor: pointer; font-weight: 600; color: var(--text-primary);">查看原始JSON数据</summary>
      <pre id="raw-data" style="background: var(--bg-secondary); padding: 1rem; border-radius: 4px; overflow-x: auto; margin-top: 1rem;"></pre>
    </details>
  </div>

  <!-- 依赖库 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="js/theme-manager.js"></script>
  <script src="js/chart-parser.js"></script>
  <script src="js/chart-factory.js"></script>

  <script>
    let chartInstance = null;
    let currentData = null;

    // 获取主题颜色
    function getThemeColors() {
      const style = getComputedStyle(document.documentElement);
      return {
        bgPrimary: style.getPropertyValue('--bg-primary').trim() || '#ffffff',
        bgSecondary: style.getPropertyValue('--bg-secondary').trim() || '#f5f5f5',
        textPrimary: style.getPropertyValue('--text-primary').trim() || '#1a1a1a',
        textSecondary: style.getPropertyValue('--text-secondary').trim() || '#4a4a4a',
        border: style.getPropertyValue('--border-color').trim() || '#d0d0d0',
        accentPrimary: style.getPropertyValue('--accent-primary').trim() || '#3b82f6',
        seriesColors: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452', '#9a60b4']
      };
    }

    // 加载图表数据
    async function loadChart() {
      const tableName = document.getElementById('tableName').value;
      const chartType = document.getElementById('chartType').value;
      const limit = document.getElementById('limit').value;
      const errorContainer = document.getElementById('error-container');
      const chartDiv = document.getElementById('chart');
      const dataInfo = document.getElementById('data-info');
      const rawData = document.getElementById('raw-data');

      errorContainer.innerHTML = '';
      chartDiv.innerHTML = '<div class="loading">加载中...</div>';

      try {
        // 调用后端API，添加table参数
        const response = await fetch(`api/chart/family-impact?table=${tableName}&chartType=${chartType}&limit=${limit}`);
        const result = await response.json();

        if (result.code !== 200) {
          throw new Error(result.message || '加载失败');
        }

        currentData = result.data;

        // 显示原始JSON
        rawData.textContent = JSON.stringify(result, null, 2);

        // 显示数据信息
        dataInfo.innerHTML = `
          <strong>数据行数:</strong> ${currentData.rows.length} |
          <strong>列数:</strong> ${currentData.columns.length} |
          <strong>列名:</strong> ${currentData.columns.join(', ')}
        `;

        // 渲染图表
        renderChart(currentData);

      } catch (error) {
        console.error('加载失败:', error);
        errorContainer.innerHTML = `<div class="error">错误: ${error.message}</div>`;
        chartDiv.innerHTML = `<div class="loading">加载失败，请检查后端服务是否正常运行</div>`;
      }
    }

    // 渲染图表
    function renderChart(chartData) {
      const chartDiv = document.getElementById('chart');
      chartDiv.innerHTML = '';

      // 初始化ECharts实例
      if (chartInstance) {
        chartInstance.dispose();
      }
      chartInstance = echarts.init(chartDiv);

      try {
        // 解析数据
        let parsedData;
        if (chartData.chartType === 'pie') {
          parsedData = ChartParser.parsePie(chartData, chartData.config || {});
        } else if (chartData.chartType === 'scatter') {
          parsedData = ChartParser.parseScatter(chartData, chartData.config || {});
        } else {
          parsedData = ChartParser.parse(chartData, chartData.config || {});
        }

        // 生成图表配置
        const chartOptions = (chartData.config && chartData.config.chartOptions) || {};
        const option = ChartFactory.create(
          chartData.chartType,
          parsedData,
          getThemeColors(),
          chartOptions
        );

        // 设置图表
        chartInstance.setOption(option);

        console.log('图表渲染成功', {
          chartType: chartData.chartType,
          dataRows: chartData.rows.length,
          columns: chartData.columns
        });

      } catch (error) {
        console.error('图表渲染失败:', error);
        chartDiv.innerHTML = `<div class="error">图表渲染失败: ${error.message}</div>`;
      }
    }

    // 下载数据
    function downloadData() {
      if (!currentData) {
        alert('没有可下载的数据');
        return;
      }

      const dataStr = JSON.stringify(currentData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `family-impact-data-${new Date().getTime()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // 响应主题变化
    document.addEventListener('theme:themeChanged', () => {
      if (currentData && chartInstance) {
        renderChart(currentData);
      }
    });

    // 响应窗口大小变化
    window.addEventListener('resize', () => {
      if (chartInstance) {
        chartInstance.resize();
      }
    });

    // 页面加载时自动加载图表
    window.addEventListener('load', () => {
      loadChart();
    });
  </script>
</body>
</html>
