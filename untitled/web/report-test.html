<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报告渲染测试 - ReportTestServlet</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/report.css">
  <link rel="stylesheet" href="css/request-capsule.css">
  <style>
    .test-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .test-controls label {
      font-weight: 500;
    }
    .test-controls input {
      width: 80px;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .test-controls .button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent-primary);
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    .test-controls .button:hover {
      opacity: 0.9;
    }
    .test-controls .button.secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    .json-preview {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .json-preview.hidden {
      display: none;
    }
    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 {
      margin-top: 0;
      color: var(--text-primary);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .report-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .status-dot.error {
      background: #ef4444;
    }
    .toggle-json {
      font-size: 12px;
      color: var(--accent-primary);
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>报告渲染测试</h2>
      <p>从 <code>/api/report-test</code> 接口获取数据，测试前后端格式兼容性。</p>

      <div class="test-controls">
        <label>bindex:</label>
        <input type="number" id="bindexInput" value="1" min="1" />

        <label>limit:</label>
        <input type="number" id="limitInput" value="200" min="1" max="2000" />

        <button class="button" id="loadBtn">加载报告</button>
        <button class="button secondary" id="refreshBtn">强制刷新</button>

        <div class="report-status" id="reportStatus">
          <span class="status-dot"></span>
          <span class="status-text">等待加载</span>
        </div>
      </div>

      <span class="toggle-json" id="toggleJson">显示原始 JSON</span>
      <div class="json-preview hidden" id="jsonPreview"></div>
    </div>

    <div class="card">
      <h2>渲染结果</h2>
      <div id="reportViewer" class="report-viewer"></div>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/6.0.0/echarts.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.9.0/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/request.js"></script>
  <script src="js/chart-parser.js"></script>
  <script src="js/chart-factory.js"></script>
  <script src="js/report-renderer.js"></script>
  <script src="js/theme-manager.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const bindexInput = document.getElementById('bindexInput');
      const limitInput = document.getElementById('limitInput');
      const loadBtn = document.getElementById('loadBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const reportViewer = document.getElementById('reportViewer');
      const reportStatus = document.getElementById('reportStatus');
      const jsonPreview = document.getElementById('jsonPreview');
      const toggleJson = document.getElementById('toggleJson');

      // 初始化渲染器
      const renderer = new ReportRenderer({
        container: reportViewer,
        statusElement: reportStatus
      });

      // 切换 JSON 显示
      toggleJson.addEventListener('click', () => {
        jsonPreview.classList.toggle('hidden');
        toggleJson.textContent = jsonPreview.classList.contains('hidden') ? '显示原始 JSON' : '隐藏原始 JSON';
      });

      // 加载报告
      async function loadReport(forceRefresh = false) {
        const bindex = parseInt(bindexInput.value) || 1;
        const limit = parseInt(limitInput.value) || 200;

        const statusDot = reportStatus.querySelector('.status-dot');
        const statusText = reportStatus.querySelector('.status-text');

        statusDot.classList.remove('error');
        statusText.textContent = '正在加载...';

        try {
          // 直接调用 /api/report-test 接口
          const url = `api/report-test?bindex=${bindex}&limit=${limit}${forceRefresh ? '&refresh=1' : ''}`;
          const response = await axios.get(url);
          const data = response.data;

          // 显示原始 JSON
          jsonPreview.textContent = JSON.stringify(data, null, 2);

          // 渲染报告
          renderer.renderFromPayload(data);

          statusText.textContent = `报告 ${bindex} 加载完成`;
        } catch (error) {
          console.error('加载失败:', error);
          statusDot.classList.add('error');

          if (error.response) {
            statusText.textContent = `错误 ${error.response.status}: ${error.response.data?.message || '未知错误'}`;
            jsonPreview.textContent = JSON.stringify(error.response.data, null, 2);
          } else {
            statusText.textContent = '网络错误: ' + error.message;
            jsonPreview.textContent = error.message;
          }
        }
      }

      loadBtn.addEventListener('click', () => loadReport(false));
      refreshBtn.addEventListener('click', () => loadReport(true));

      // 回车键加载
      bindexInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadReport(false);
      });
    });
  </script>
</body>
</html>
