<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客报告编辑器</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/request-capsule.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .page-header {
      background: var(--bg-primary);
      padding: 20px 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .page-header h1 {
      margin: 0 0 16px 0;
      font-size: 24px;
      color: var(--text-primary);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-controls label {
      font-weight: 500;
      color: var(--text-secondary);
    }

    .header-controls select,
    .header-controls input[type="number"] {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      min-width: 120px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .blocks-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .block {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
    }

    .block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .block-type-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .block-type-badge.text {
      background: #dbeafe;
      color: #1e40af;
    }

    .block-type-badge.chart {
      background: #fef3c7;
      color: #92400e;
    }

    .block-controls {
      display: flex;
      gap: 4px;
    }

    .block-controls button {
      padding: 4px 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .block-controls button:hover {
      background: var(--border-color);
    }

    .block-content textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
    }

    .chart-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .chart-selector label {
      font-weight: 500;
      color: var(--text-secondary);
      min-width: 80px;
    }

    .chart-selector select {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      min-width: 200px;
    }

    .add-block-area {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 20px;
      background: var(--bg-primary);
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .footer-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 20px;
      background: var(--bg-primary);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
      background: var(--bg-primary);
      border: 2px dashed var(--border-color);
      border-radius: 8px;
    }

    .preview-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      padding: 20px;
      overflow: auto;
    }

    .preview-modal.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .preview-content {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 24px;
      max-width: 1200px;
      width: 100%;
      margin-top: 40px;
      position: relative;
    }

    .preview-close {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .table-preview {
      margin-top: 8px;
      max-height: 200px;
      overflow: auto;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px;
    }

    .table-preview table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .table-preview th,
    .table-preview td {
      padding: 6px 8px;
      border: 1px solid var(--border-color);
      text-align: left;
    }

    .table-preview th {
      background: var(--bg-primary);
      font-weight: 600;
    }

    .status-message {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .status-message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .status-message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面头部 -->
    <div class="page-header">
      <h1>博客报告编辑器</h1>
      <div class="header-controls">
        <label>报告索引:</label>
        <select id="bindexMode">
          <option value="new">新建报告</option>
          <option value="existing">编辑已有</option>
        </select>
        <span id="bindexAuto" style="display: inline-flex; align-items: center; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-secondary); color: var(--text-secondary); font-size: 14px; min-width: 120px;">
          自动分配...
        </span>
        <!-- 兼容：旧版脚本曾依赖 bindexInput；隐藏保留以避免浏览器缓存旧脚本时空指针 -->
        <input type="number" id="bindexInput" value="1" min="1" placeholder="输入 bindex" disabled style="display:none;">
        <select id="reportListSelector" style="display: none;">
          <option value="">加载中...</option>
        </select>
        <button class="btn btn-secondary" id="loadBtn" disabled>加载报告</button>
        <button class="btn btn-secondary" id="refreshListBtn" style="display: none;">刷新列表</button>
      </div>
    </div>

    <!-- 状态消息 -->
    <div id="statusMessage"></div>

    <!-- 内容块列表 -->
    <div class="blocks-container" id="blocksContainer">
      <div class="empty-state">
        请选择报告模式并开始编辑，或点击下方按钮添加内容块
      </div>
    </div>

    <!-- 添加内容块 -->
    <div class="add-block-area">
      <button class="btn btn-secondary" id="addTextBtn">+ 添加文本块</button>
      <button class="btn btn-secondary" id="addChartBtn">+ 添加图表块</button>
    </div>

    <!-- 底部操作 -->
    <div class="footer-actions">
      <button class="btn btn-secondary" id="previewBtn">预览报告</button>
      <button class="btn btn-primary" id="saveBtn">保存报告</button>
      <button class="btn btn-danger" id="deleteBtn">删除报告</button>
    </div>
  </div>

  <!-- 预览模态框 -->
  <div class="preview-modal" id="previewModal">
    <div class="preview-content">
      <button class="preview-close" id="closePreview">关闭</button>
      <div id="previewViewer"></div>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.9.0/axios.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/6.0.0/echarts.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/request.js"></script>
  <script src="js/chart-parser.js"></script>
  <script src="js/chart-factory.js"></script>
  <script src="js/report-renderer.js"></script>
  <script src="js/theme-manager.js"></script>
  <script src="js/blog-editor.js"></script>
</body>
</html>
