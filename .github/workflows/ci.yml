name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WebMain
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout DatabaseConnectModule
        uses: actions/checkout@v4
        with:
          repository: BigData2026QDU/DatabaseConnectModule
          path: deps/DatabaseConnectModule

      - name: Checkout JsonUtilModule
        uses: actions/checkout@v4
        with:
          repository: BigData2026QDU/JsonUtilModule
          path: deps/JsonUtilModule

      - name: Checkout ObjectPoolModule
        uses: actions/checkout@v4
        with:
          repository: BigData2026QDU/ObjectPoolModule
          path: deps/ObjectPoolModule

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install required module artifacts
        run: |
          mvn -B -ntp -f deps/DatabaseConnectModule/pom.xml clean install -DskipTests
          mvn -B -ntp -f deps/JsonUtilModule/JsonUtilModule/pom.xml clean install -DskipTests
          mvn -B -ntp -f deps/ObjectPoolModule/service-pool/pom.xml clean install -DskipTests

      - name: Build WAR package
        run: mvn -B -ntp -f hivehbase/pom.xml clean package -DskipTests

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hivehbase-war
          path: hivehbase/target/hivehbase.war
          if-no-files-found: error
