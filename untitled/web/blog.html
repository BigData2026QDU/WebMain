<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客文章</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/report.css">
  <link rel="stylesheet" href="css/request-capsule.css">
</head>
<body>
  <div class="container">
    <div id="articleViewer" class="report-viewer"></div>
  </div>

  <!-- 脚本 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/6.0.0/echarts.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.9.0/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/request.js"></script>
  <script src="js/chart-parser.js"></script>
  <script src="js/chart-factory.js"></script>
  <script src="js/report-renderer.js"></script>
  <script src="js/theme-manager.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const articleViewer = document.getElementById('articleViewer');
      const renderer = new ReportRenderer({
        container: articleViewer,
        requestFactory: (articleId) => new Request(`加载文章:${articleId}`, `articles/${articleId}`)
      });

      // 自动加载文章示例
      const sampleArticle = {
        title: 'Web应用性能优化实战：从3.2秒到1.1秒的优化之路',
        tag: '性能优化',
        updatedAt: '2025-12-10 14:30',
        source: '李明 - 前端架构师',
        range: '优化周期：2025年11月-12月',
        summary: '本文记录了我们团队对一个大型数据平台进行性能优化的完整过程，通过一系列技术手段将首屏加载时间从3.2秒优化到1.1秒，页面性能评分从62分提升至94分，用户体验得到显著改善。',
        metrics: [
          { label: '首屏加载时间', value: '1.1s', trend: '-2.1s (↓66%)' },
          { label: 'Lighthouse评分', value: '94分', trend: '+32分' },
          { label: '用户留存率', value: '89.2%', trend: '+12.5%' }
        ],
        sections: [
          {
            title: '背景与问题',
            paragraphs: [
              '我们的大数据可视化平台上线半年后，用户反馈页面加载缓慢，尤其是在移动端和弱网环境下体验极差。通过Chrome DevTools和Lighthouse分析，发现首屏加载时间高达3.2秒，性能评分仅62分，远低于行业标准。',
              '经过详细的性能分析，我们识别出三个主要瓶颈：第一，静态资源体积过大，ECharts和Axios库未做按需加载，导致初始JS包达到850KB；第二，图表渲染阻塞主线程，大量数据点的绘制导致页面卡顿；第三，未启用HTTP/2和资源压缩，网络传输效率低下。'
            ]
          },
          {
            title: '优化方案与实施',
            paragraphs: [
              '针对这些问题，我们制定了系统的优化方案。首先是资源优化，将ECharts改为CDN引入并启用gzip压缩，JS包体积从850KB降至320KB。同时将非关键CSS延迟加载，优先渲染首屏内容。',
              '其次是渲染优化，对图表数据进行分批渲染，单次渲染不超过1000个数据点，超出部分采用虚拟滚动。引入Web Worker处理数据计算，避免阻塞主线程。主题切换时使用CSS Variables而非重新渲染，减少DOM操作。',
              '最后是网络优化，启用HTTP/2多路复用，配置CDN加速静态资源，开启Brotli压缩。对API接口实现请求合并和缓存策略，减少不必要的网络请求。这些优化措施在两周内全部完成并上线。'
            ]
          },
          {
            title: '优化效果',
            paragraphs: [
              '优化后的效果超出预期。首屏加载时间从3.2秒降至1.1秒，降幅达66%。Lighthouse性能评分从62分提升至94分，各项核心指标均达到优秀水平：FCP从2.8秒降至0.9秒，LCP从4.1秒降至1.8秒，TBT从580ms降至120ms。',
              '更重要的是业务指标的改善。页面跳出率从38%降至15%，用户平均停留时长从2.3分钟增加到5.7分钟，用户留存率提升12.5个百分点。移动端用户占比从22%提升至41%，说明性能优化显著改善了移动端体验。下图展示了优化前后各项性能指标的对比，以及不同优化手段对加载时间的贡献度。'
            ]
          }
        ],
        charts: [
          {
            title: '性能指标优化对比 (优化前 vs 优化后)',
            data: [
              { label: 'FCP (ms)', value: 2800 },
              { label: 'FCP优化后', value: 900 },
              { label: 'LCP (ms)', value: 4100 },
              { label: 'LCP优化后', value: 1800 },
              { label: 'TBT (ms)', value: 580 },
              { label: 'TBT优化后', value: 120 },
              { label: 'TTI (ms)', value: 5200 },
              { label: 'TTI优化后', value: 2100 }
            ]
          },
          {
            title: '各优化手段对加载时间的贡献 (节省毫秒数)',
            data: [
              { label: '资源压缩与CDN', value: 850 },
              { label: '代码分割', value: 620 },
              { label: '图片优化', value: 380 },
              { label: '缓存策略', value: 290 },
              { label: '渲染优化', value: 260 },
              { label: '其他优化', value: 150 }
            ]
          }
        ],
        notes: [
          '本次优化的完整技术方案和代码已整理成内部文档，可供其他项目参考。',
          '性能监控已接入Sentry和Google Analytics，持续跟踪线上性能表现。',
          '后续计划：引入Service Worker实现离线缓存，进一步提升弱网环境下的用户体验。'
        ]
      };

      renderer.renderFromPayload({ report: sampleArticle });
    });
  </script>
</body>
</html>
