name: Release

on:
  issues:
    types:
      - opened
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional semantic version, for example 1.0.0"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  packages: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[可发布]')
    runs-on: ubuntu-latest
    env:
      MAVEN_SETTINGS_PATH: /tmp/webmain-maven-settings.xml
      MAVEN_REPO_USERNAME: ${{ github.actor }}
      MAVEN_REPO_TOKEN: ${{ github.token }}

    steps:
      - name: Acknowledge release trigger
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 已接收发布请求',
                '',
                '- 当前仓库职责：仅执行构建与发布',
                '- 构建前会先安装另外三个 Java 模块的 artifact',
                '- 本仓库不负责运行测试，前置验证由外部测试框架完成'
              ].join('\n')
            });

      - name: Checkout WebMain
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout DatabaseConnectModule
        uses: actions/checkout@v4
        with:
          repository: BigData2026QDU/DatabaseConnectModule
          path: deps/DatabaseConnectModule

      - name: Checkout JsonUtilModule
        uses: actions/checkout@v4
        with:
          repository: BigData2026QDU/JsonUtilModule
          path: deps/JsonUtilModule

      - name: Checkout ObjectPoolModule
        uses: actions/checkout@v4
        with:
          repository: BigData2026QDU/ObjectPoolModule
          path: deps/ObjectPoolModule

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Write Maven settings for GitHub Packages
        shell: bash
        run: |
          cat <<EOF > "$MAVEN_SETTINGS_PATH"
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-webmain</id>
                <username>${MAVEN_REPO_USERNAME}</username>
                <password>${MAVEN_REPO_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import xml.etree.ElementTree as ET

          def normalize(version: str) -> str:
              version = version.strip().lstrip("v")
              if version.endswith("-SNAPSHOT"):
                  version = version[:-9]
              parts = version.split(".")
              if len(parts) == 2:
                  version = f"{version}.0"
              if not re.fullmatch(r"\d+\.\d+\.\d+", version):
                  raise SystemExit(f"Release version must be semantic version, got: {version!r}")
              return version

          event = json.load(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8"))
          manual = ((event.get("inputs") or {}).get("release_version") or "").strip()

          if manual:
              release_version = normalize(manual)
          else:
              ns = {"m": "http://maven.apache.org/POM/4.0.0"}
              tree = ET.parse("hivehbase/pom.xml")
              version_node = tree.getroot().find("m:version", ns)
              base_version = normalize(version_node.text if version_node is not None else "")
              latest_tag = subprocess.run(
                  ["git", "tag", "--list", "v*", "--sort=-version:refname"],
                  check=True,
                  capture_output=True,
                  text=True,
              ).stdout.strip().splitlines()

              if latest_tag:
                  major, minor, patch = map(int, normalize(latest_tag[0]).split("."))
                  release_version = f"{major}.{minor}.{patch + 1}"
              else:
                  release_version = base_version

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"release_version={release_version}\n")
              fh.write(f"release_tag=v{release_version}\n")
          PY

      - name: Install required module artifacts
        run: |
          mvn -B -ntp -f deps/DatabaseConnectModule/pom.xml clean install -DskipTests
          mvn -B -ntp -f deps/JsonUtilModule/JsonUtilModule/pom.xml clean install -DskipTests
          mvn -B -ntp -f deps/ObjectPoolModule/service-pool/pom.xml clean install -DskipTests

      - name: Set Maven project version for release
        run: mvn -B -ntp -f hivehbase/pom.xml versions:set -DnewVersion=${{ steps.version.outputs.release_version }} -DgenerateBackupPoms=false

      - name: Build and publish WAR package
        run: mvn -B -ntp -s "$MAVEN_SETTINGS_PATH" -f hivehbase/pom.xml clean deploy -DskipTests

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: hivehbase-release-war
          path: hivehbase/target/hivehbase.war
          if-no-files-found: error

      - name: Create or update GitHub release
        id: github_release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "issues" ]; then
            TRIGGER_DESCRIPTION="Issue #${{ github.event.issue.number }}"
          else
            TRIGGER_DESCRIPTION="workflow_dispatch"
          fi

          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          cat <<EOF > "$NOTES_FILE"
          ## 发布说明

          - 发布版本：${RELEASE_VERSION}
          - 触发来源：${TRIGGER_DESCRIPTION}
          - 对应提交：${GITHUB_SHA}
          - 构建命令：\`mvn -B -ntp -s \$MAVEN_SETTINGS_PATH -f hivehbase/pom.xml clean deploy -DskipTests\`
          - 依赖准备：先安装 DatabaseConnectModule、JsonUtilModule、ObjectPoolModule 的本地 artifact
          - Maven Packages：\`org.bigdata:hivehbase:${RELEASE_VERSION}:war\`
          - 数据库配置：WAR 保持模板配置，运行时通过 \`hibernate.cfg.xml\` / \`DB_*\` 注入
          - 测试执行：本仓库未运行测试；前置验证由外部测试框架负责
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$NOTES_FILE"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$NOTES_FILE" --target "$GITHUB_SHA"
          fi

          gh release upload "$RELEASE_TAG" "hivehbase/target/hivehbase.war#hivehbase-${RELEASE_VERSION}.war" --clobber
          echo "release_url=$(gh release view "$RELEASE_TAG" --json url -q .url)" >> "$GITHUB_OUTPUT"

      - name: Close trigger issue on success
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          RELEASE_URL: ${{ steps.github_release.outputs.release_url }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        with:
          script: |
            const body = [
              '## 构建与发布已完成',
              '',
              `- 发布版本：${process.env.RELEASE_VERSION}`,
              `- GitHub Release：${process.env.RELEASE_URL}`,
              '- 构建产物：`hivehbase/target/hivehbase.war`',
              '- GitHub Packages：`org.bigdata:hivehbase:${process.env.RELEASE_VERSION}:war`',
              '- 依赖准备：已先安装另外三个 Java 模块的 artifact',
              '- 数据库配置：WAR 未内嵌 secret，部署时请通过模板配置或 `DB_*` 注入',
              '- 测试说明：本仓库未执行测试；发布前置验证由外部测试框架负责'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on failure
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 构建或发布失败',
                '',
                `- 工作流运行：${process.env.RUN_URL}`,
                '- 当前仓库职责：仅执行构建与发布',
                '- 请优先检查依赖 artifact 安装步骤和 WAR 构建日志'
              ].join('\n')
            });
