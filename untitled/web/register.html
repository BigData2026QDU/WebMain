<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 大数据平台</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="var(--accent-primary)"/>
            <path d="M24 14L32 20V34H28V24H20V34H16V20L24 14Z" fill="white"/>
          </svg>
        </div>
        <h1>创建新账户</h1>
        <p class="subtitle">欢迎加入大数据平台</p>
      </div>

      <form id="registerForm" class="login-form">
        <div class="form-group">
          <label for="username">用户名</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="请输入用户名"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="请输入密码"
            autocomplete="new-password"
            required
          />
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">确认密码</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-input"
            placeholder="请再次输入密码"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="login-button">
          <span id="registerButtonText">注册</span>
          <span id="registerButtonLoader" class="button-loader" style="display: none;">
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
              <circle class="spinner-circle" cx="12" cy="12" r="10" stroke="white" stroke-width="3" fill="none"/>
            </svg>
          </span>
        </button>

        <div id="registerMessage" class="login-message" style="display: none;"></div>
      </form>

      <div class="login-footer">
        <p>已有账户？ <a href="login.html">立即登录</a></p>
      </div>
    </div>

    <div class="login-info">
      <h2>功能特性</h2>
      <ul class="feature-list">
        <li>
          <span class="feature-icon">📊</span>
          <div>
            <strong>实时数据分析</strong>
            <p>强大的数据可视化与分析能力</p>
          </div>
        </li>
        <li>
          <span class="feature-icon">🔒</span>
          <div>
            <strong>安全可靠</strong>
            <p>企业级安全保障，数据加密传输</p>
          </div>
        </li>
        <li>
          <span class="feature-icon">⚡</span>
          <div>
            <strong>高性能</strong>
            <p>毫秒级响应，支持海量数据处理</p>
          </div>
        </li>
        <li>
          <span class="feature-icon">🌙</span>
          <div>
            <strong>主题切换</strong>
            <p>支持日间/夜间模式自动切换</p>
          </div>
        </li>
      </ul>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.9.0/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/request.js"></script>
  <script src="js/theme-manager.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const registerForm = document.getElementById('registerForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const registerButton = registerForm.querySelector('.login-button');
      const registerButtonText = document.getElementById('registerButtonText');
      const registerButtonLoader = document.getElementById('registerButtonLoader');
      const registerMessage = document.getElementById('registerMessage');

      // 显示消息
      function showMessage(message, type = 'info') {
        registerMessage.textContent = message;
        registerMessage.className = 'login-message ' + type;
        registerMessage.style.display = 'block';
      }

      // 设置加载状态
      function setLoading(isLoading) {
        registerButton.disabled = isLoading;
        registerButtonText.style.display = isLoading ? 'none' : 'inline';
        registerButtonLoader.style.display = isLoading ? 'inline-flex' : 'none';
      }

      // 表单提交
      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!username || !password) {
          showMessage('请输入用户名和密码', 'error');
          return;
        }

        if (password !== confirmPassword) {
          showMessage('两次输入的密码不一致', 'error');
          return;
        }

        setLoading(true);
        registerMessage.style.display = 'none';

        try {
          const registerRequest = new Request('用户注册', 'register');
          const response = await registerRequest.post({ username, password });

          console.log('注册成功:', response.data);
          showMessage('注册成功！即将跳转到登录页面...', 'success');

          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);

        } catch (error) {
          console.error('注册失败:', error);
          setLoading(false);

          let errorMessage = '注册失败，请重试';
          if (error.response) {
            if (error.response.status === 409) {
              errorMessage = '该用户名已被注册';
            } else if (error.response.data && error.response.data.message) {
              errorMessage = error.response.data.message;
            }
          } else if (error.request) {
            errorMessage = '无法连接到服务器，请检查网络';
          }
          showMessage(errorMessage, 'error');
        }
      });
    });
  </script>
</body>
</html>
