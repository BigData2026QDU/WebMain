<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报告展示</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/report.css">
  <link rel="stylesheet" href="css/request-capsule.css">
  <style>
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .page-header h1 {
      margin: 0;
      color: var(--text-primary);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .logout-btn {
      padding: 8px 16px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: var(--bg-tertiary);
    }

    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 4px var(--shadow-color);
    }

    .card h2 {
      margin: 0 0 16px 0;
      color: var(--text-primary);
      font-size: 18px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent-primary);
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .button:hover {
      opacity: 0.9;
    }

    .button.secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .report-list {
      display: grid;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
    }

    .report-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .report-item:hover {
      border-color: var(--accent-primary);
      background: var(--bg-tertiary);
    }

    .report-item.active {
      border-color: var(--accent-primary);
      background: var(--bg-tertiary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }

    .report-id {
      font-weight: 600;
      color: var(--text-primary);
    }

    .report-preview {
      color: var(--text-secondary);
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .report-blocks {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    .status-dot.loading {
      background: #3b82f6;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-dot.error {
      background: #ef4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .toggle-json {
      font-size: 12px;
      color: var(--accent-primary);
      cursor: pointer;
      text-decoration: underline;
      margin-bottom: 8px;
      display: inline-block;
    }

    .json-preview {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .json-preview.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>报告展示</h1>
      <div class="user-info">
        <span id="userWelcome">欢迎</span>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>报告列表</h2>
        <button class="button secondary" id="refreshListBtn">刷新列表</button>
      </div>

      <div class="status" id="listStatus">
        <span class="status-dot"></span>
        <span class="status-text">正在加载...</span>
      </div>

      <div class="report-list" id="reportList"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>报告内容</h2>
        <button class="button secondary" id="refreshReportBtn" disabled>刷新报告</button>
      </div>

      <div class="status" id="reportStatus">
        <span class="status-dot"></span>
        <span class="status-text">请从上方列表选择报告</span>
      </div>

      <span class="toggle-json" id="toggleJson">显示原始 JSON</span>
      <div class="json-preview hidden" id="jsonPreview"></div>

      <div id="reportViewer" class="report-viewer"></div>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/6.0.0/echarts.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.9.0/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/request.js"></script>
  <script src="js/chart-parser.js"></script>
  <script src="js/chart-factory.js"></script>
  <script src="js/report-renderer.js"></script>
  <script src="js/theme-manager.js"></script>

  <script>
    let currentBindex = null;

    // 退出登录
    function logout() {
      if (confirm('确定要退出登录吗？')) {
        // 清除可能的本地存储
        localStorage.clear();
        // 跳转到登录页面
        window.location.href = 'login.html';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const reportList = document.getElementById('reportList');
      const listStatus = document.getElementById('listStatus');
      const reportViewer = document.getElementById('reportViewer');
      const reportStatus = document.getElementById('reportStatus');
      const refreshListBtn = document.getElementById('refreshListBtn');
      const refreshReportBtn = document.getElementById('refreshReportBtn');
      const jsonPreview = document.getElementById('jsonPreview');
      const toggleJson = document.getElementById('toggleJson');

      // 初始化渲染器
      const renderer = new ReportRenderer({
        container: reportViewer,
        statusElement: reportStatus
      });

      // 设置状态
      function setStatus(statusEl, type, text) {
        const dot = statusEl.querySelector('.status-dot');
        const textEl = statusEl.querySelector('.status-text');

        dot.className = 'status-dot';
        if (type === 'loading') dot.classList.add('loading');
        if (type === 'error') dot.classList.add('error');

        textEl.textContent = text;
      }

      // 切换 JSON 显示
      toggleJson.addEventListener('click', () => {
        jsonPreview.classList.toggle('hidden');
        toggleJson.textContent = jsonPreview.classList.contains('hidden')
          ? '显示原始 JSON'
          : '隐藏原始 JSON';
      });

      // 加载报告列表
      async function loadReportList() {
        setStatus(listStatus, 'loading', '正在加载报告列表...');

        try {
          const req = new Request('获取报告列表', 'api/blog/editor/list');
          const resp = await req.get({ limit: 100, refresh: 1 });
          const list = resp.data.data || [];

          renderReportList(list);
          setStatus(listStatus, 'success', `共 ${list.length} 个报告`);
        } catch (error) {
          console.error('加载报告列表失败:', error);
          setStatus(listStatus, 'error', '加载失败');
          reportList.innerHTML = '<div class="empty-state">加载报告列表失败，请刷新重试</div>';
        }
      }

      // 渲染报告列表
      function renderReportList(list) {
        reportList.innerHTML = '';

        if (!list || list.length === 0) {
          reportList.innerHTML = '<div class="empty-state">暂无报告</div>';
          return;
        }

        list.forEach(item => {
          const itemEl = document.createElement('div');
          itemEl.className = 'report-item';
          if (item.bindex === currentBindex) {
            itemEl.classList.add('active');
          }

          const preview = item.firstText
            ? item.firstText.substring(0, 50)
            : '(无文本内容)';

          itemEl.innerHTML = `
            <div class="report-id">报告 #${item.bindex}</div>
            <div class="report-preview">${preview}</div>
            <div class="report-blocks">${item.blocks} 个块</div>
          `;

          itemEl.addEventListener('click', () => {
            loadReport(item.bindex);
          });

          reportList.appendChild(itemEl);
        });
      }

      // 加载报告
      async function loadReport(bindex, forceRefresh = false) {
        currentBindex = bindex;
        refreshReportBtn.disabled = false;

        // 更新列表选中状态
        document.querySelectorAll('.report-item').forEach(item => {
          item.classList.remove('active');
        });
        const activeItem = Array.from(document.querySelectorAll('.report-item'))
          .find(item => item.textContent.includes(`#${bindex}`));
        if (activeItem) {
          activeItem.classList.add('active');
        }

        setStatus(reportStatus, 'loading', `正在加载报告 ${bindex}...`);

        try {
          const url = `api/report-test?bindex=${bindex}&limit=200${forceRefresh ? '&refresh=1' : ''}`;
          const response = await axios.get(url);
          const data = response.data;

          // 显示原始 JSON
          jsonPreview.textContent = JSON.stringify(data, null, 2);

          // 渲染报告
          renderer.renderFromPayload(data);

          setStatus(reportStatus, 'success', `报告 ${bindex} 加载完成`);
        } catch (error) {
          console.error('加载报告失败:', error);
          setStatus(reportStatus, 'error', `加载失败`);

          if (error.response) {
            reportViewer.innerHTML = `<div class="empty-state">错误 ${error.response.status}: ${error.response.data?.message || '未知错误'}</div>`;
            jsonPreview.textContent = JSON.stringify(error.response.data, null, 2);
          } else {
            reportViewer.innerHTML = `<div class="empty-state">网络错误: ${error.message}</div>`;
          }
        }
      }

      // 事件绑定
      refreshListBtn.addEventListener('click', loadReportList);
      refreshReportBtn.addEventListener('click', () => {
        if (currentBindex) {
          loadReport(currentBindex, true);
        }
      });

      // 初始加载
      loadReportList();
    });
  </script>
</body>
</html>
